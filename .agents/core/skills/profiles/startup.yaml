# Profile: Startup
# Balanced between speed and quality

id: startup
name: Startup
description: "Fast iteration with reasonable quality. Ship early, learn fast."

# What to generate
generate_docs:
  - PRD
  - ARCHITECTURE
  - DATABASE
  - API
  - UI
  - TASKS
  - PROJECT_GRAPH

# What to skip
skip_docs:
  - ROADMAP  # Optional — generate on request
  - DEPLOYMENT  # Handle later

# Skill preferences
prefer_skills:
  - postgres
  - redis
  - docker
  - jwt

exclude_skills:
  - kubernetes
  - ddd
  - microservices

# Quality gates
enforce:
  adr: false            # Record decisions, but don't block on it
  testing: true          # Tests required
  security_audit: false  # Not mandatory at this stage
  code_review: true      # Self-review

# Architecture defaults
defaults:
  architecture: modular-monolith
  database: postgresql
  auth: jwt
  hosting: vercel-railway
  orm: prisma
